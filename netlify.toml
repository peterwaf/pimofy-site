[build]
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"
external_node_modules = ["sequelize", "pg", "pg-hstore"]
included_files = ["views/**", "public/**", "assets/**", "config/taxonomy.json", "styles.css", "script.js"]

[[redirects]]
from = "/*"
to = "/.netlify/functions/app"
status = 200
